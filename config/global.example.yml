appName: llm-bot
nodeEnv: development
logLevel: info
dataDir: data
proxy:
  http:
    type: http
    host: 127.0.0.1
    port: 7890
  https:
    type: socks5
    host: 127.0.0.1
    port: 7891
onebot:
  enabled: true
  provider: generic
  wsUrl: ws://127.0.0.1:3001
  httpUrl: http://127.0.0.1:3000
  typing:
    enabled: true
    private: true
    group: false
  historyBackfill:
    enabled: true
    maxMessagesPerSession: 20
    maxTotalMessages: 100
    requestDelayMs: 100
llm:
  enabled: false
  routingPreset: balanced
  timeoutMs: 300000
  firstTokenTimeoutMs: 30000
  toolCallMaxIterations: 8
  mainRouting:
    enabled: true
    timeoutMs: 300000
    enableThinking: true
  summarizer:
    enabled: true
    timeoutMs: 45000
    enableThinking: false
  sessionCaptioner:
    enabled: true
    timeoutMs: 15000
    enableThinking: false
  imageCaptioner:
    enabled: true
    timeoutMs: 30000
    enableThinking: false
    maxConcurrency: 2
  imageInspector:
    enabled: true
    timeoutMs: 45000
    enableThinking: false
    maxConcurrency: 2
  audioTranscription:
    enabled: true
    timeoutMs: 30000
    enableThinking: false
    maxConcurrency: 2
  turnPlanner:
    enabled: true
    timeoutMs: 20000
    recentMessageCount: 6
    enableThinking: false
    maxWaitPasses: 1
    supplementToolsets: true
  debugDump:
    enabled: false
conversation:
  setup:
    skipPersonaInitialization: false
  historyWindow:
    maxRecentMessages: 80
    maxImageReferences: 5
  images:
    maxSerializedPixels: 1048576
    maxCachedFiles: 100
  debounce:
    defaultBaseSeconds: 4
    minBaseSeconds: 4
    maxBaseSeconds: 10
    smoothingFactor: 0.2
    finalMultiplier: 1.5
    plannerWaitMultiplier: 2
  outbound:
    disableStreamingSplit: false
    baseDelayMs: 1200
    charDelayMs: 200
    maxDelayMs: 20000
    randomFactorMin: 0.8
    randomFactorMax: 1.25
  historyCompression:
    enabled: true
    triggerTokens: 150000
    retainTokens: 7000
    retainMessageCount: 8
    tokenEstimation:
      cjkTokens: 1.5
      nonAsciiTokens: 1
      asciiTokens: 0.25
  group:
    requireAtMention: true
    ambientRecallMessageCount: 8
context:
  embedding:
    timeoutMs: 30000
    textPreprocessVersion: v1
    chunkerVersion: user-facts-v1
  retrieval:
    maxResults: 4
    candidateMultiplier: 4
    minScore: 0
    maxSynchronousEmbeddingDocuments: 16
  indexing:
    maintenanceEmbeddingBatchSize: 32
    rebuildOnMaintenance: true
  retention:
    maxUserSearchChunks: 500
    maxSearchChunkAgeDays: 90
    summaryAfterDays: 30
    deletedRetentionDays: 14
    maintenanceIntervalMs: 3600000
whitelist:
  enabled: true
internalApi:
  enabled: false
  port: 3030
  webui:
    # 启用后在 /webui/ 提供 WebUI 界面。
    # 启用时整个服务监听 0.0.0.0（可从局域网其他设备访问），禁用时仅 127.0.0.1。
    enabled: false
    auth:
      # WebUI 认证开关；关闭后页面访问与 internal API 不再要求登录。
      # 首次启用认证时会自动生成密码并写入 data/webui-auth.json。
      enabled: true
    port: 3031
    # 仅开发态 Vite WebUI 使用；用于放行反代或自定义域名访问。
    allowedHosts: []
scheduler:
  enabled: true
  defaultTimezone: Asia/Shanghai
shell:
  enabled: false
  defaultTimeoutMs: 15000
  maxTimeoutMs: 600000
  maxOutputChars: 5000
  sessionTtlMs: null
  terminalEvents:
    enabled: true
    inputDetectionDebounceMs: 800
    inputConfirmationMs: 1200
    inputPromptCooldownMs: 30000
    inputSuppressionAfterWriteMs: 1200
    detectionTailMaxChars: 8000
localFiles:
  enabled: true
  root: data
  maxPatchFileBytes: 524288
chatFiles:
  enabled: true
  root: chat-files
  maxUploadBytes: 33554432
  gcGracePeriodMs: 604800000
comfy:
  enabled: false
  apiBaseUrl: http://192.168.0.223:8188
  templateRoot: templates/comfyui
  submitTimeoutMs: 15000
  pollIntervalMs: 3000
  maxConcurrentTasks: 2
  aspectRatios:
    "1:1":
      width: 1024
      height: 1024
  templates:
    - id: sdxl
      label: SDXL
      workflowFile: sdxl.json
      enabled: true
      description: 基础 SDXL 工作流模板
      parameterBindings:
        positivePromptPath: /15/inputs/value
        widthPath: /6/inputs/width
        heightPath: /6/inputs/height
      resultPolicy:
        maxAutoIterations: 1
        defaultActionHint: decide_by_model
contentSafety:
  # 可选功能，默认关闭。启用后如果 provider 未配置或调用失败，只记录 warning 并放行，不影响正常聊天。
  enabled: false
  failPolicy: allow
  audit:
    preserveOriginalText: true
    preserveOriginalFiles: true
    exposeOriginalInAdminApi: true
    maxOriginalTextChars: 20000
  cache:
    enabled: true
    ttlMs: 2592000000
    version: 1
    storeAllowResults: true
  textBatch:
    enabled: true
    maxMessages: 10
    maxChars: 4000
    singleMessageMaxChars: 1200
    maxLocateConcurrency: 5
  marker:
    includeProvider: true
    includeLabels: true
    includeConfidence: false
    includeSubjectRef: true
  providers:
    # 本地关键词 provider 用于联调审核链路；生产可替换为 aliyun_content_moderation。
    localKeyword:
      type: keyword
      enabled: false
      blockedTextKeywords: []
      blockedMediaNameKeywords: []
    aliyunCm:
      type: aliyun_content_moderation
      enabled: false
      endpoint: green-cip.ap-southeast-1.aliyuncs.com
      regionId: ap-southeast-1
      # 可以直接明文填写，也可以使用下面的 Env 字段从环境变量读取。
      # accessKeyId: your-access-key-id
      # accessKeySecret: your-access-key-secret
      accessKeyIdEnv: ALIBABA_CLOUD_ACCESS_KEY_ID
      accessKeySecretEnv: ALIBABA_CLOUD_ACCESS_KEY_SECRET
      timeoutMs: 6000
      proxy: false
      services:
        text: llm_query_moderation
        image: baselineCheck
      variants:
        text: text_plus
        image: image
  profiles:
    preLlm:
      text:
        provider: aliyunCm
        action: replace_in_projection
        blockRiskLevels: [high]
        reviewRiskLevels: [medium]
      image:
        provider: aliyunCm
        action: hide_from_projection_and_mark
        blockRiskLevels: [high]
        reviewRiskLevels: [medium]
      emoji:
        provider: aliyunCm
        action: hide_from_projection_and_mark
      audio:
        provider: aliyunCm
        action: mark_unavailable
      unsupportedFilePolicy: mark
  routes:
    prompt:
      preLlm: preLlm
    toolMedia:
      chatFile: preLlm
      localFile: preLlm
    llmProviderFallback:
      dashscope:
        useDataInspectionHeader: false
search:
  googleGrounding:
    enabled: false
    proxy: false
    model: gemini-2.5-flash
    timeoutMs: 30000
    maxSources: 8
    resolveRedirectUrls: true
  aliyunIqs:
    enabled: false
    proxy: false
    timeoutMs: 30000
    defaultNumResults: 8
    maxNumResults: 20
    defaultIncludeMainText: false
    defaultIncludeMarkdownText: false
browser:
  enabled: false
  browseMaxContentChars: 16000
  sessionTtlMs: 3600000
  playwright:
    enabled: false
    proxy: false
    headless: true
    actionTimeoutMs: 15000
    navigationTimeoutMs: 30000
    maxSnapshotChars: 20000
    persistSessionState: true
    persistSessionStorage: true
    profileAutoSaveDebounceMs: 250
    profileMaxCount: 24
    screenshotMaxBytes: 5242880
backup:
  profileRotateLimit: 10
