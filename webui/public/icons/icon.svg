<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1c1d2e"/>
      <stop offset="100%" stop-color="#0d0f1a"/>
    </linearGradient>
    <linearGradient id="bubble-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2196f3"/>
      <stop offset="100%" stop-color="#0057b8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="none" stroke="#2a2d4a" stroke-width="2" opacity="0.6"/>

  <!-- Chat bubble (no icon inside) -->
  <path d="
    M 90 152
    Q 90 98  144 98
    L 368 98
    Q 422 98  422 152
    L 422 294
    Q 422 348  368 348
    L 212 348
    L 144 424
    L 144 348
    Q 90 348  90 294
    Z"
    fill="url(#bubble-fill)" filter="url(#glow)"/>
</svg>
